  <main>
    <div class="video-wrap">
 
      <video id="player" preload="metadata">
        <source src="/media/video/sadsatan_trailer01_optimized.mp4" type="video/mp4">
      </video>
 
      <!-- Controls overlay -->
      <div id="controls" class="controls">
 
        <!-- Progress bar -->

          <div id="progress-bar" class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
            <div id="progress-thumb" class="progress-thumb"></div>
          </div>
        </div>
 
        <div class="controls-row">
 
          <!-- Play / Pause -->
          <button id="btn-play" class="ctrl-btn" aria-label="Play">
            <!-- Play icon -->
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <!-- Pause icon -->
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>

          </button>
 
          <!-- Time -->

          <!-- Spacer -->
          <div class="ctrl-spacer"></div>
 
          <!-- Mute -->
          <button id="btn-mute" class="ctrl-btn" aria-label="Mute">
            <svg class="icon-vol" viewBox="0 0 24 24" fill="currentColor">

          <input id="volume" class="volume-slider" type="range" min="0" max="1" step="0.02" value="1" aria-label="Volume">

            </svg>
            <svg class="icon-exit-fs" viewBox="0 0 24 24" fill="currentColor" style="display:none">
